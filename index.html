<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="wrapper">
    <div class="board">
      <div class="team">
        <h3>HOME</h3>
        <div class="display">
          <span class="score" id="home">0</span>
        </div>
        <div class="btns">
          <button class="btn" onclick="add('home', 1)">+1</button>
          <button class="btn" onclick="add('home', 2)">+2</button>
          <button class="btn" onclick="add('home', 3)">+3</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="team">
        <h3>AWAY</h3>
        <div class="display">
          <span class="score" id="guest">0</span>
        </div>
        <div class="btns">
          <button class="btn" onclick="add('guest', 1)">+1</button>
          <button class="btn" onclick="add('guest', 2)">+2</button>
          <button class="btn" onclick="add('guest', 3)">+3</button>
        </div>
      </div>
    </div>

    <button class="btn-reset" onclick="reset()">Reiniciar Jogo</button>
  </div>

  <script src="index.js"></script>

</body>
</html>
